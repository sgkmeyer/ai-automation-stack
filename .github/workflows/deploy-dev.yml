name: Deploy to Dev

on:
  push:
    branches: [dev]

jobs:
  deploy:
    name: GitOps deploy (dev)
    runs-on: ubuntu-latest
    # No approval gate — dev deploys automatically on push

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Load SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Configure SSH known_hosts
        env:
          VM_SSH_KNOWN_HOSTS: ${{ secrets.VM_SSH_KNOWN_HOSTS }}
        run: |
          : > ~/.ssh/known_hosts
          # Use pinned host keys when provided.
          if [[ -n "${VM_SSH_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${VM_SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy dev stack via GitOps
        run: |
          VM_HOST="${{ secrets.VM_TAILSCALE_HOST }}"
          VM_HOST="${VM_HOST:-100.82.169.113}"
          echo "Deploy target: ${VM_HOST}"
          ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=15 \
            ubuntu@"${VM_HOST}" \
            '/home/ubuntu/ai-automation-stack/scripts/gitops-deploy-dev.sh'

  smoke-test:
    name: Smoke test (dev)
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Check dev n8n via Tailscale
        run: |
          VM_HOST="${{ secrets.VM_TAILSCALE_HOST }}"
          VM_HOST="${VM_HOST:-100.82.169.113}"
          code=$(curl -sf -o /dev/null -w "%{http_code}" \
            "http://${VM_HOST}:5679" || true)
          if [[ "$code" == "200" ]]; then
            echo "OK  dev n8n -> $code"
          else
            echo "FAIL dev n8n -> $code (expected 200)"
            exit 1
          fi
