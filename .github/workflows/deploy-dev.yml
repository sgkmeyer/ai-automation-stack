name: Deploy to Dev

on:
  push:
    branches: [dev]

jobs:
  deploy:
    name: GitOps deploy (dev)
    runs-on: ubuntu-latest
    # No approval gate — dev deploys automatically on push

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Load SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Configure SSH known_hosts
        env:
          VM_TAILSCALE_HOST: ${{ secrets.VM_TAILSCALE_HOST }}
          VM_SSH_KNOWN_HOSTS: ${{ secrets.VM_SSH_KNOWN_HOSTS }}
        run: |
          if [[ -z "${VM_TAILSCALE_HOST}" ]]; then
            echo "ERROR: Missing VM_TAILSCALE_HOST secret." >&2
            exit 1
          fi
          : > ~/.ssh/known_hosts
          # Prefer pinned host keys from secret when available.
          if [[ -n "${VM_SSH_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${VM_SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          fi
          # Always add live host keys for the current VM endpoint after Tailscale is connected.
          ssh-keyscan -H "${VM_TAILSCALE_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          ssh-keyscan "${VM_TAILSCALE_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          if [[ ! -s ~/.ssh/known_hosts ]]; then
            echo "ERROR: Unable to populate ~/.ssh/known_hosts for ${VM_TAILSCALE_HOST}." >&2
            exit 1
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy dev stack via GitOps
        run: |
          ssh -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=15 \
            ubuntu@${{ secrets.VM_TAILSCALE_HOST }} \
            '/home/ubuntu/ai-automation-stack/scripts/gitops-deploy-dev.sh'

  smoke-test:
    name: Smoke test (dev)
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Check dev n8n via Tailscale
        run: |
          code=$(curl -sf -o /dev/null -w "%{http_code}" \
            http://${{ secrets.VM_TAILSCALE_HOST }}:5679 || true)
          if [[ "$code" == "200" ]]; then
            echo "OK  dev n8n -> $code"
          else
            echo "FAIL dev n8n -> $code (expected 200)"
            exit 1
          fi
