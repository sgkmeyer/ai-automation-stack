name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: GitOps deploy
    runs-on: ubuntu-latest
    environment: production      # manual approval gate — configure in GitHub repo settings

    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Verify Tailscale connection
        run: tailscale status

      - name: Load SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -l -f ~/.ssh/id_rsa

      - name: Configure SSH known_hosts
        env:
          VM_SSH_KNOWN_HOSTS: ${{ secrets.VM_SSH_KNOWN_HOSTS }}
        run: |
          : > ~/.ssh/known_hosts
          # Use pinned host keys when provided.
          if [[ -n "${VM_SSH_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${VM_SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy via GitOps
        run: |
          VM_HOST_RAW="${{ secrets.VM_TAILSCALE_HOST }}"
          VM_HOST="$(printf '%s' "${VM_HOST_RAW}" | tr -d '[:space:]')"
          if [[ -z "${VM_HOST}" || ! "${VM_HOST}" =~ ^[A-Za-z0-9.-]+$ ]]; then
            VM_HOST="100.82.169.113"
          fi
          echo "Deploy target: ${VM_HOST}"
          ssh -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=15 \
            ubuntu@"${VM_HOST}" \
            '/home/ubuntu/ai-automation-stack/scripts/gitops-deploy.sh'

  smoke-test:
    name: Smoke test
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for services to stabilize
        run: sleep 30

      - name: External endpoint checks
        run: |
          check() {
            local url="$1" expected="$2" retries=3 delay=10
            local code attempt
            for attempt in $(seq 1 "$retries"); do
              code=$(curl -sf -o /dev/null -w "%{http_code}" "$url" || true)
              if [[ "$code" == "$expected" ]]; then
                echo "OK  $url -> $code"
                return 0
              fi
              if [[ "$attempt" -lt "$retries" ]]; then
                echo "RETRY $url -> $code (expected $expected, attempt $attempt/$retries)"
                sleep "$delay"
              fi
            done
            echo "FAIL $url -> $code (expected $expected)"
            exit 1
          }
          check https://n8n.satoic.com 200
          check https://openclaw.satoic.com 200
          check https://portainer.satoic.com 401
